name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application image
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          .\scripts\package-windows.ps1 -AppVersion $version

      - name: Create release archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force target\release | Out-Null
          Compress-Archive `
            -Path target\dist\LogScope `
            -DestinationPath target\release\LogScope-windows-x64.zip

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            target\release\LogScope-windows-x64.zip `
            --title "LogScope ${{ github.ref_name }}" `
            --generate-notes
