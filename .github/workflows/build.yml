name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify with Maven
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Validate Windows packaging script
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          [void][scriptblock]::Create(
            (Get-Content scripts/package-windows.ps1 -Raw)
          )
